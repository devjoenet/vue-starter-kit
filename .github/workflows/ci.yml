name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    env: &app_env
      APP_ENV: testing
      CACHE_STORE: array
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
      MAIL_MAILER: array
      PULSE_ENABLED: false
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      TELESCOPE_ENABLED: false
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare test database
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi

      - name: Run backend gates
        run: |
          composer run style:fix
          git diff --exit-code
          composer run phpstan
          composer run rector
          composer run test:type-coverage
          composer run test:parallel

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    env: *app_env
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare test database
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi

      - name: Run frontend gates
        run: |
          npm run test:frontend
          npm run build
          git diff --exit-code

  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env: *app_env
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare test database
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Run browser smoke flows
        run: php artisan test --compact tests/Browser/Auth/AuthBrowserTest.php tests/Browser/Auth/TwoFactorAuthenticationBrowserTest.php
